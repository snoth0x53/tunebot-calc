  function getAudioCtx(ref) {
    if (!ref.current) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      ref.current = new Ctx();
    }
    if (ref.current.state === "suspended") ref.current.resume();
    return ref.current;
  }
  function playTone(ctx, freqHz, duration = 0.9) {
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(freqHz, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(freqHz * 0.85, 20), now + duration);
    const oscGain = ctx.createGain();
    oscGain.gain.setValueAtTime(1e-4, now);
    oscGain.gain.exponentialRampToValueAtTime(0.55, now + 8e-3);
    oscGain.gain.exponentialRampToValueAtTime(1e-3, now + duration);
    osc.connect(oscGain);
    oscGain.connect(ctx.destination);
    const bufferSize = ctx.sampleRate * 0.05;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = "bandpass";
    noiseFilter.frequency.value = freqHz * 2;
    noiseFilter.Q.value = 0.7;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.35, now);
    noiseGain.gain.exponentialRampToValueAtTime(1e-3, now + 0.06);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + duration);
    noise.start(now);
    noise.stop(now + 0.06);
  }
  function playDrumTone(ctx, fundamentalHz, topHz, bottomHz, duration = 1.4) {
    const now = ctx.currentTime;

    master.gain.value = 0.7;
    master.connect(ctx.destination);
    const body = ctx.createOscillator();
    body.type = "sine";
    body.frequency.setValueAtTime(fundamentalHz * 1.06, now);
    body.frequency.exponentialRampToValueAtTime(fundamentalHz, now + 0.09);
    body.frequency.exponentialRampToValueAtTime(Math.max(fundamentalHz * 0.92, 20), now + duration);
    const bodyGain = ctx.createGain();
    bodyGain.gain.setValueAtTime(1e-4, now);
    bodyGain.gain.exponentialRampToValueAtTime(0.65, now + 0.01);
    bodyGain.gain.exponentialRampToValueAtTime(1e-3, now + duration);
    body.connect(bodyGain);
    bodyGain.connect(master);
    [topHz, bottomHz].forEach((f, i) => {
      const partial = ctx.createOscillator();
      partial.type = "triangle";
      partial.frequency.setValueAtTime(f, now);
      const pGain = ctx.createGain();
      pGain.gain.setValueAtTime(1e-4, now);
      pGain.gain.exponentialRampToValueAtTime(0.09, now + 0.01);
      pGain.gain.exponentialRampToValueAtTime(5e-4, now + duration * 0.6);
      partial.connect(pGain);
      pGain.connect(master);
      partial.start(now);
      partial.stop(now + duration * 0.6);
    });
    const bufferSize = ctx.sampleRate * 0.08;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = "bandpass";
    noiseFilter.frequency.value = fundamentalHz * 3;
    noiseFilter.Q.value = 0.6;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.5, now);
    noiseGain.gain.exponentialRampToValueAtTime(1e-3, now + 0.09);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(master);
    body.start(now);
    body.stop(now + duration);
    noise.start(now);
    noise.stop(now + 0.09);
  }
  function analyzeSpectrum(freqDb, sampleRate, fftSize, minHz, maxHz) {
    const binHz = sampleRate / fftSize;
    const startBin = Math.max(2, Math.floor(minHz / binHz));
    const endBin = Math.min(freqDb.length - 2, Math.ceil(maxHz / binHz));
    if (endBin <= startBin) return null;
    let maxDb = -Infinity;
    for (let i = startBin; i <= endBin; i++) if (freqDb[i] > maxDb) maxDb = freqDb[i];
    if (maxDb < -90) return null;
    const threshold = maxDb - 18;
    const peaks = [];
    for (let i = startBin; i <= endBin; i++) {
      const v = freqDb[i];
      if (v > threshold && v > freqDb[i - 1] && v >= freqDb[i + 1]) {
        const a = freqDb[i - 1], b = v, c = freqDb[i + 1];
        const denom = a - 2 * b + c;
        const delta = denom !== 0 ? 0.5 * (a - c) / denom : 0;
        peaks.push({ freq: (i + delta) * binHz, db: b });
        if (peaks.length >= 24) break;
      }
    }
    if (peaks.length === 0) return null;
    // Gruppierungsabstand skaliert mit der Frequenz (6 %, mindestens 8 Hz),
    // weil die Fell-Partialt\xF6ne nach oben hin enger zusammenr\xFCcken.
    const groupGap = (f) => Math.max(8, f * 0.06);
    const subsets = [];
    let current = [peaks[0]];
    for (let k = 1; k < peaks.length; k++) {
      if (peaks[k].freq - peaks[k - 1].freq <= groupGap(peaks[k - 1].freq)) current.push(peaks[k]);
      else {
        subsets.push(current);
        current = [peaks[k]];
      }
    }
    subsets.push(current);
    const best = (arr) => arr.reduce((m, p) => p.db > m.db ? p : m);
    const groups = subsets.map((s) => best(s).freq);
    return { groups };
  }
  // W\xE4hlt \xFCber die letzten Anschl\xE4ge den Ton, der am konstantesten wiederkehrt.
  // filterHz (optional): nur Kandidaten im Bereich \xB120 % um diesen Wert werden betrachtet.
  function pickStablePeak(history, tolPct = 0.04, filterHz = null) {
    const lo = filterHz ? filterHz * 0.8 : null;
    const hi = filterHz ? filterHz * 1.2 : null;
    const inBand = (f) => filterHz == null || (f >= lo && f <= hi);
    const all = [];
    history.forEach((groups) => groups.forEach((f) => {
      if (inBand(f)) all.push(f);
    }));
    if (all.length === 0) return null;
    let bestFreq = null, bestScore = -1;
    for (const cand of all) {
      const tol = cand * tolPct;
      let hits = 0;
      const matched = [];
      history.forEach((groups) => {
        let found = null;
        for (const f of groups) {
          if (!inBand(f)) continue;
          if (Math.abs(f - cand) <= tol) {
            if (found === null || Math.abs(f - cand) < Math.abs(found - cand)) found = f;
          }
        }
        if (found !== null) { hits++; matched.push(found); }
      });
      const score = hits * 1000 - cand * 0.001;
      if (score > bestScore) {
        bestScore = score;
        bestFreq = matched.reduce((a, b) => a + b, 0) / matched.length;
      }
    }
    return bestFreq;
  }
